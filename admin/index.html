<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Evergrain CMS — Sign in</title>
<meta name="robots" content="noindex, nofollow" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,300;9..144,400&family=Inter:wght@500;600&family=Manrope:wght@400;500;600&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="/admin/admin.css" />
<link rel="icon" type="image/png" href="/assets/img/evergrain_favicon.png" />
</head>
<body class="login-page">

<div class="login-card">
  <div class="login-card__brand">
    <img src="/assets/logos/FullLogo_Green.png" alt="Evergrain Photobooth" />
  </div>
  <h1 class="login-card__title">Sign in</h1>
  <p class="login-card__subtitle">Evergrain Content Management</p>

  <div class="form-error" data-login-error role="alert"></div>

  <form data-login-form>
    <div class="field">
      <label class="field__label" for="username">Username</label>
      <input class="field__input" type="text" id="username" name="username" required autocomplete="username" autofocus />
    </div>
    <div class="field">
      <label class="field__label" for="password">Password</label>
      <input class="field__input" type="password" id="password" name="password" required autocomplete="current-password" />
    </div>
    <button type="submit" class="btn btn--primary" style="width:100%; justify-content:center;">Sign in</button>
  </form>
</div>

<script>
  // If already signed in, hop to dashboard
  fetch("/api/admin/me").then(r => {
    if (r.ok) {
      const next = new URLSearchParams(location.search).get("next") || "/admin/dashboard";
      location.href = next;
    }
  });

  const form = document.querySelector("[data-login-form]");
  const errorEl = document.querySelector("[data-login-error]");
  form?.addEventListener("submit", async (e) => {
    e.preventDefault();
    errorEl.classList.remove("is-visible");
    const submitBtn = form.querySelector("button[type='submit']");
    const orig = submitBtn.textContent;
    submitBtn.disabled = true;
    submitBtn.textContent = "Signing in…";

    const data = Object.fromEntries(new FormData(form).entries());
    try {
      const resp = await fetch("/api/admin/login", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(data),
      });
      if (!resp.ok) {
        const body = await resp.json().catch(() => ({}));
        throw new Error(body.error || "Sign-in failed");
      }
      const next = new URLSearchParams(location.search).get("next") || "/admin/dashboard";
      location.href = next;
    } catch (err) {
      errorEl.textContent = err.message || "Sign-in failed. Try again.";
      errorEl.classList.add("is-visible");
      submitBtn.disabled = false;
      submitBtn.textContent = orig;
    }
  });
</script>

</body>
</html>
